[build]
  publish = "public"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/schedules"
  to = "/.netlify/functions/import-schedules"
  status = 200

[[redirects]]
  from = "/api/share-schedules"
  to = "/.netlify/functions/share-schedules"
  status = 200

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "private, no-store, max-age=0"
    X-Content-Type-Options = "nosniff"
